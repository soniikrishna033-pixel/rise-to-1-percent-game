<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rise to the 1% - Investment Strategy Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff3e3e;
            --dark-red: #8b0000;
            --black: #050505;
            --dark-gray: rgba(20, 20, 20, 0.7);
            --text-white: #f0f0f0;
            --accent-gold: #ffd700;
            --glass: rgba(20, 20, 20, 0.6);
            --border: rgba(255, 62, 62, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--black);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% 50%, #1a0505 0%, #000000 100%);
            perspective: 1000px;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,0,0,0.05) 0%, transparent 20%),
                        radial-gradient(circle, rgba(255,215,0,0.03) 0%, transparent 20%);
            background-position: 0 0, 50px 50px;
            animation: bgShift 20s linear infinite;
            z-index: -1;
        }

        @keyframes bgShift {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-bar { width: 100%; display: flex; justify-content: center; padding: 20px; z-index: 10; }
        .logo-bar img { max-width: 380px; width: 95%; filter: drop-shadow(0 0 10px rgba(255,0,0,0.3)); }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 20px;
            z-index: 10;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            text-align: center;
            margin-bottom: 20px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, opacity 0.4s ease, border-color 0.3s ease;
        }

        .card:hover { border-color: rgba(255, 62, 62, 0.6); }

        h1 {
            color: var(--primary-red);
            font-size: 2.3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255,0,0,0.4);
            transform: translateZ(30px);
        }

        h2 { color: var(--accent-gold); margin-bottom: 15px; transform: translateZ(20px); }

        .btn {
            background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
            color: white;
            border: none;
            padding: 15px;
            font-size: 1rem;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255,0,0,0.2);
            transform: translateZ(10px);
        }

        .btn:hover {
            transform: translateY(-2px) translateZ(15px);
            box-shadow: 0 8px 25px rgba(255,0,0,0.5);
        }

        .btn-secondary {
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--primary-red);
            box-shadow: none;
        }

        .mode-select { display: flex; gap: 10px; margin-bottom: 20px; transform: translateZ(15px); }
        .mode-btn {
            flex: 1; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid #333;
            color: #888; cursor: pointer; border-radius: 10px; transition: all 0.3s;
        }
        .mode-btn.active { background: var(--primary-red); color: white; border-color: var(--primary-red); }

        .timer-bar {
            width: 100%; height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 10px; margin: 15px 0; overflow: hidden;
        }
        .timer-fill {
            height: 100%; background: linear-gradient(90deg, var(--primary-red), var(--accent-gold));
            width: 100%; transition: width 1s linear;
        }

        .question-text { font-size: 1.2rem; margin-bottom: 20px; line-height: 1.5; transform: translateZ(20px); }

        .options-grid { display: grid; gap: 10px; transform: translateZ(15px); }
        
        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 15px; text-align: left; border-radius: 12px;
            cursor: pointer; transition: all 0.2s ease;
            position: relative; overflow: hidden;
        }

        .option-btn:hover:not(.disabled-btn) {
            background: rgba(255, 62, 62, 0.1);
            border-color: var(--primary-red);
            transform: translateX(5px);
        }

        .option-btn.correct { background: #27ae60 !important; border-color: #2ecc71; animation: pulse 0.5s; }
        .option-btn.wrong { background: #c0392b !important; border-color: #e74c3c; animation: shake 0.4s; }

        @keyframes pulse {
            0% { transform: scale(1); } 50% { transform: scale(1.02); box-shadow: 0 0 15px #2ecc71; } 100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); }
        }

        .disabled-btn { pointer-events: none; opacity: 0.9; }
        .hidden { display: none !important; }

        .score-display {
            font-size: 3.5rem; color: var(--accent-gold); font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); transform: translateZ(30px);
        }

        .rank-display { font-size: 1.2rem; color: #aaa; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        .leaderboard-entry {
            display: flex; justify-content: space-between; padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02); margin-bottom: 5px; border-radius: 8px;
        }

        .input-field {
            width: 100%; padding: 14px; margin: 12px 0; background: rgba(0,0,0,0.4);
            border: 1px solid var(--primary-red); color: white; border-radius: 12px;
            font-size: 16px; transition: box-shadow 0.3s; transform: translateZ(15px);
        }
        .input-field:focus { outline: none; box-shadow: 0 0 15px rgba(255,0,0,0.3); }

        .hint-container {
            display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-bottom: 10px;
        }
        #hint-btn {
            background: rgba(255, 215, 0, 0.1); border: 1px solid var(--accent-gold);
            border-radius: 50%; width: 40px; height: 40px; display: flex;
            align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s;
        }
        #hint-btn:hover:not(:disabled) { background: var(--accent-gold); transform: rotate(15deg) scale(1.1); }
        #hint-btn:hover:not(:disabled) svg { fill: #000; }
        #hint-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #555; }

        footer { text-align: center; margin-top: auto; font-size: 13px; color: #aaa; padding: 20px; line-height: 1.5; }

        /* Custom Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box {
            transform: scale(0.8) translateZ(30px); 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 90%; max-width: 400px;
            border-color: var(--primary-red);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(255,0,0,0.3);
        }
        .modal-overlay.active .modal-box { transform: scale(1) translateZ(30px); }
    </style>
</head>

<div class="logo-bar">
    <img src="https://i.ibb.co/Q3rhKKzp/IMG-20260311-161054.png" alt="Rise to the 1%">

<div class="container">

        <div class="hint-container">
            <button id="hint-btn" onclick="useHint()">

                    <path d="M12 2a7 7 0 0 0-4 12.9V18a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-3.1A7 7 0 0 0 12 2z"/>
                </svg>

        <div id="options-container" class="options-grid"></div>
    </div>

    <div id="result-screen" class="card hidden">
        <h1 id="end-title">Challenge Complete</h1>
        <p>Final Valuation</p>

    </div>

    <div id="leaderboard-screen" class="card hidden">

            <button id="modal-btn" class="btn">Acknowledge</button>
        </div>
    </div>
</div>

<script>
    // --- 3D Card Tilt Effect ---
    document.addEventListener('mousemove', (e) => {
        const cards = document.querySelectorAll('.card:not(.hidden)');
        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * -5; 
            const rotateY = ((x - centerX) / centerX) * 5;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
    });

    document.addEventListener('mouseleave', () => {
        document.querySelectorAll('.card').forEach(card => {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
        });
    });

    // Custom Alert Function

        const modal = document.getElementById('custom-modal');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-message').innerText = message;
        
        modal.classList.add('active');
        
        const btn = document.getElementById('modal-btn');
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        
        newBtn.onclick = () => {
            modal.classList.remove('active');
            if(callback) callback();
        };
    }

    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    }

 function startGame() {
        playerName = document.getElementById("username").value.trim();
        if (!playerName) { 
            showGameAlert("Identity Required", "Enter your name to access the market."); 
            return; 
        }

        score = 0;
        currentQuestionIndex = 0;
        
        gameQuestions = baseQuestions.filter(q => q.type === currentMode).sort(() => Math.random() - 0.5);

        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("game-screen").classList.remove("hidden");
        document.getElementById("player-display").innerText = `${playerName}`;
        document.getElementById("score-display").innerText = "Net Worth: $0";

        loadQuestion();
    }

    function loadQuestion() {
        clearInterval(timer);
        hintUsed = false;
        
        const hintBtn = document.getElementById("hint-btn");
        hintBtn.disabled = score < 30; 
        hintBtn.style.opacity = score < 30 ? "0.3" : "1";

        if (currentQuestionIndex >= gameQuestions.length) {
            showGameAlert("Market Conquered", "You've completed all available strategies!", () => endGame(true));
            return;
        }

        let q = gameQuestions[currentQuestionIndex];
        document.getElementById("question-number").innerText = `Strategy ${currentQuestionIndex + 1}`;
        document.getElementById("question-text").innerText = q.question;

        let container = document.getElementById("options-container");
        container.innerHTML = "";

        q.options.forEach((opt, i) => {
            let btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerHTML = `<span>${opt}</span>`;
            btn.onclick = () => selectAnswer(i);
            container.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        timeLeft = TIME_LIMIT;
        document.getElementById("time-left").innerText = timeLeft;
        document.getElementById("timer-fill").style.width = "100%";

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById("time-left").innerText = timeLeft;
            document.getElementById("timer-fill").style.width = (timeLeft / TIME_LIMIT * 100) + "%";

            if (timeLeft <= 0) {
                clearInterval(timer);
                document.querySelectorAll(".option-btn").forEach(btn => btn.classList.add("disabled-btn"));
                
                showGameAlert("Market Closed", "Time is up! Your portfolio has been liquidated.", () => {
                    endGame(false);
                });
            }
        }, 1000);
    }

    function selectAnswer(index) {
        clearInterval(timer);
        let q = gameQuestions[currentQuestionIndex];
        let buttons = document.querySelectorAll(".option-btn");

        buttons.forEach(btn => btn.classList.add("disabled-btn"));

        if (index === q.answer) {
            buttons[index].classList.add("correct");
            let speedBonus = Math.floor(timeLeft / 2);
            score += (10 + speedBonus);
            
            document.getElementById("score-display").innerText = `Net Worth: $${score}`;
            
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex >= gameQuestions.length) {
                    showGameAlert("Market Conquered", "You've completed all available strategies!", () => endGame(true));
                } else {
                    loadQuestion();
                }
            }, 800);
        } else {
            buttons[index].classList.add("wrong");
            buttons[q.answer].classList.add("correct"); 
            
            setTimeout(() => {
                showGameAlert("Bad Investment", "Wrong strategy chosen! You have been eliminated from the market.", () => {
                    endGame(false);
                });
            }, 1000);
        }
    }

    function useHint() {
        if (hintUsed || score < 30) {
            if(score < 30) {
                showGameAlert("Insufficient Funds", "You need a Net Worth of at least $30 to buy Insider Intel.");
            } else {
                showGameAlert("Intel Exhausted", "You have already used your hint for this round.");
            }
            return;
        }
        
        score -= 30;
        document.getElementById("score-display").innerText = `Net Worth: $${score}`;
        
        let q = gameQuestions[currentQuestionIndex];
        let buttons = document.querySelectorAll(".option-btn");
        let wrong = [];

        buttons.forEach((b, i) => { if (i !== q.answer) wrong.push(i); });
        wrong.sort(() => Math.random() - 0.5);

        buttons[wrong[0]].style.opacity = "0";
        buttons[wrong[1]].style.opacity = "0";
        setTimeout(() => {
            buttons[wrong[0]].style.visibility = "hidden";
            buttons[wrong[1]].style.visibility = "hidden";
        }, 300);

        hintUsed = true;
        document.getElementById("hint-btn").disabled = true;
    }

    function endGame(completed) {
        document.getElementById("game-screen").classList.add("hidden");
        const resultScreen = document.getElementById("result-screen");
        resultScreen.classList.remove("hidden");
        
        document.getElementById("end-title").innerText = completed ? "Ascended to the 1%" : "Portfolio Liquidated";
        document.getElementById("end-title").style.color = completed ? "#2ecc71" : "var(--primary-red)";

        let rankText = "Liquidity Provider";
        if (score > 150) rankText = "Hedge Fund Manager";
        else if (score > 80) rankText = "Institutional Investor";
        else if (score > 40) rankText = "Retail Trader";
        document.getElementById("final-rank").innerText = rankText;

        saveScore();

        let currentDisplay = 0;
        let finalScoreEl = document.getElementById("final-score");
        let duration = 1000; 
        let startTime = null;

        function animateScore(timestamp) {
            if (!startTime) startTime = timestamp;
            let progress = timestamp - startTime;
            let percentage = Math.min(progress / duration, 1);
            
            let easeOutQuart = 1 - Math.pow(1 - percentage, 4);
            currentDisplay = Math.floor(easeOutQuart * score);
            
            finalScoreEl.innerText = `$${currentDisplay}`;
            if (percentage < 1) requestAnimationFrame(animateScore);
        }
        requestAnimationFrame(animateScore);
    }

    function saveScore() {
        try {
            let leaderboard = JSON.parse(localStorage.getItem("riseLeaderboard") || "[]");
            leaderboard.push({ name: playerName, score: score });
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 20);
            localStorage.setItem("riseLeaderboard", JSON.stringify(leaderboard));
        } catch (error) {
            console.warn("Could not save to localStorage due to browser security restrictions.", error);
        }
    }

    function showLeaderboard() {
        document.getElementById("start-screen").classList.add("hidden");
        document.getElementById("result-screen").classList.add("hidden");
        document.getElementById("leaderboard-screen").classList.remove("hidden");

        let list = document.getElementById("leaderboard-list");    
        list.innerHTML = "";    

        try {    
            let leaderboard = JSON.parse(localStorage.getItem("riseLeaderboard") || "[]");    
            leaderboard.forEach((p, i) => {    
                let div = document.createElement("div");    
                div.className = "leaderboard-entry";    
                div.innerHTML = "<span>" + (i + 1) + ". " + p.name + "</span><span style='color:var(--accent-gold); font-weight:bold;'>$" + p.score + "</span>";    
                list.appendChild(div);    
            });    
            if (leaderboard.length === 0) {
                list.innerHTML = "<span style='color:#aaa'>No entries yet. Be the first!</span>";
            }
        } catch (error) {    
            list.innerHTML = "<span>Leaderboard disabled (Local testing security)</span>";    
        }
    }

    function restartGame() {
        document.getElementById("result-screen").classList.add("hidden");
        document.getElementById("start-screen").classList.remove("hidden");
        document.getElementById("username").value = "";
    }

    function goHome() {
        document.getElementById("leaderboard-screen").classList.add("hidden");
        document.getElementById("start-screen").classList.remove("hidden");
    }

</script>
